<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咸鱼 | 插画配文</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #d8d8d8;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 30px;
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'SimHei', sans-serif;
        }
        .card {
            width: 750px;
            background: #FFFBF0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 72px 52px 60px;
            position: relative;
        }
        .headline {
            font-size: 58px;
            font-weight: 900;
            text-align: center;
            line-height: 1.35;
            color: #1a1a1a;
            letter-spacing: 3px;
        }
        .character-wrap {
            margin: 28px 0 20px;
        }
        .subtitle {
            font-size: 30px;
            font-weight: 700;
            color: #1a1a1a;
            text-align: center;
            letter-spacing: 1px;
            margin-top: 8px;
        }
        .footer {
            margin-top: 44px;
            font-size: 16px;
            color: #c0c0c0;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="headline">比成功更难的<br>是「心安理得地摆烂」</div>

        <div class="character-wrap">
            <svg width="360" height="420" viewBox="0 0 360 420" xmlns="http://www.w3.org/2000/svg">

                <!-- Decorative stars and sparkles -->
                <path d="M62 180 L68 172 L74 180 L68 188 Z" fill="#FFD700" opacity="0.8"/>
                <path d="M48 210 L52 204 L56 210 L52 216 Z" fill="#FFB5C2" opacity="0.8"/>
                <circle cx="72" cy="230" r="5" fill="#FFD700" opacity="0.7"/>

                <path d="M298 180 L304 172 L310 180 L304 188 Z" fill="#FFD700" opacity="0.8"/>
                <path d="M312 210 L316 204 L320 210 L316 216 Z" fill="#FFB5C2" opacity="0.8"/>
                <circle cx="288" cy="230" r="5" fill="#FFD700" opacity="0.7"/>

                <!-- Bottom hearts -->
                <path d="M80 345 Q84 340 89 345 Q94 340 99 345 Q99 352 89 360 Q79 352 80 345Z" fill="#FFB5C2" opacity="0.7"/>
                <path d="M260 352 Q263 348 267 352 Q271 348 275 352 Q275 357 267 363 Q259 357 260 352Z" fill="#FFB5C2" opacity="0.5"/>

                <!-- Crown (on top of head) -->
                <!-- Crown band -->
                <path d="M138 118 L222 118 L222 135 L138 135 Z" fill="#FFD700" stroke="#2a2a2a" stroke-width="2"/>
                <!-- Crown spikes -->
                <path d="M138 118 L148 92 L162 118" fill="#FFD700" stroke="#2a2a2a" stroke-width="2" stroke-linejoin="round"/>
                <path d="M162 118 L180 88 L198 118" fill="#FFD700" stroke="#2a2a2a" stroke-width="2" stroke-linejoin="round"/>
                <path d="M198 118 L212 92 L222 118" fill="#FFD700" stroke="#2a2a2a" stroke-width="2" stroke-linejoin="round"/>
                <!-- Crown gems (red dots like in original drawing) -->
                <circle cx="148" cy="96" r="6" fill="#FF6B8A" stroke="#2a2a2a" stroke-width="1.5"/>
                <circle cx="180" cy="92" r="7" fill="#FF6B8A" stroke="#2a2a2a" stroke-width="1.5"/>
                <circle cx="212" cy="96" r="6" fill="#FF6B8A" stroke="#2a2a2a" stroke-width="1.5"/>

                <!-- Main very round body (blob / salted fish energy) -->
                <ellipse cx="180" cy="248" rx="108" ry="106" fill="white" stroke="#2a2a2a" stroke-width="3"/>

                <!-- Smaller head area / face zone (merged into body) -->
                <!-- Eyes - large round with pupils, slightly drowsy/content -->
                <circle cx="150" cy="215" r="18" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
                <circle cx="210" cy="215" r="18" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
                <circle cx="154" cy="217" r="9" fill="#2a2a2a"/>
                <circle cx="214" cy="217" r="9" fill="#2a2a2a"/>
                <!-- Eye shine -->
                <circle cx="158" cy="212" r="3.5" fill="white"/>
                <circle cx="218" cy="212" r="3.5" fill="white"/>
                <!-- Sleepy/content half-lid lines -->
                <path d="M133 210 Q150 205 167 210" stroke="#2a2a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
                <path d="M193 210 Q210 205 227 210" stroke="#2a2a2a" stroke-width="2" fill="none" stroke-linecap="round"/>

                <!-- Pink cheeks -->
                <ellipse cx="122" cy="232" rx="22" ry="14" fill="#FFB5C2" opacity="0.55"/>
                <ellipse cx="238" cy="232" rx="22" ry="14" fill="#FFB5C2" opacity="0.55"/>

                <!-- Wide grin (crescent smile) -->
                <path d="M140 252 Q180 285 220 252" stroke="#2a2a2a" stroke-width="3.5" fill="none" stroke-linecap="round"/>

                <!-- Diamond / bowtie on chest -->
                <path d="M165 292 L180 275 L195 292 L180 309 Z" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linejoin="round"/>
                <!-- Bow tie cross line -->
                <line x1="165" y1="292" x2="195" y2="292" stroke="#2a2a2a" stroke-width="1.5"/>

                <!-- Tiny left arm (spread out, stubby) -->
                <path d="M76 240 Q68 255 72 272" stroke="#2a2a2a" stroke-width="3" fill="none" stroke-linecap="round"/>
                <circle cx="72" cy="280" r="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

                <!-- Tiny right arm (spread out, stubby) -->
                <path d="M284 240 Q292 255 288 272" stroke="#2a2a2a" stroke-width="3" fill="none" stroke-linecap="round"/>
                <circle cx="288" cy="280" r="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

                <!-- Very short legs -->
                <ellipse cx="152" cy="346" rx="20" ry="26" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
                <ellipse cx="208" cy="346" rx="20" ry="26" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

                <!-- Feet -->
                <ellipse cx="150" cy="368" rx="25" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
                <ellipse cx="210" cy="368" rx="25" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

                <!-- Small bubbles / "摆烂气泡" floating around -->
                <circle cx="95" cy="160" r="8" fill="none" stroke="#FFB5C2" stroke-width="2"/>
                <circle cx="108" cy="145" r="5" fill="none" stroke="#FFB5C2" stroke-width="1.5"/>
                <circle cx="265" cy="162" r="7" fill="none" stroke="#FFD700" stroke-width="2"/>
                <circle cx="252" cy="148" r="4" fill="none" stroke="#FFD700" stroke-width="1.5"/>

            </svg>
        </div>

        <div class="subtitle">1. 先翻身，翻了再说</div>

        <div class="footer">🐟 咸鱼の哲学</div>
    </div>
</body>
</html>
