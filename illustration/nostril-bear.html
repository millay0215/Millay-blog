<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鼻孔熊 | 插画配文</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #d8d8d8;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 30px;
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'SimHei', sans-serif;
        }
        .card {
            width: 750px;
            background: #FFF0F2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 72px 52px 60px;
            position: relative;
        }
        .headline {
            font-size: 58px;
            font-weight: 900;
            text-align: center;
            line-height: 1.35;
            color: #1a1a1a;
            letter-spacing: 3px;
        }
        .bracket { font-family: 'PingFang SC', sans-serif; }
        .character-wrap {
            margin: 32px 0 20px;
        }
        .subtitle {
            font-size: 30px;
            font-weight: 700;
            color: #1a1a1a;
            text-align: center;
            letter-spacing: 1px;
            margin-top: 8px;
        }
        .footer {
            margin-top: 44px;
            font-size: 16px;
            color: #c0c0c0;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="headline">比自律更难的<br>是允许自己「发呆」</div>

        <div class="character-wrap">
            <svg width="360" height="440" viewBox="0 0 360 440" xmlns="http://www.w3.org/2000/svg">

                <!-- Decorative aura / energy lines (left side) -->
                <path d="M62 200 Q38 178 50 146" stroke="#FFB5C2" stroke-width="5" fill="none" stroke-linecap="round"/>
                <path d="M52 224 Q24 205 32 172" stroke="#FFB5C2" stroke-width="4" fill="none" stroke-linecap="round"/>
                <path d="M68 245 Q44 238 50 214" stroke="#FFB5C2" stroke-width="3" fill="none" stroke-linecap="round"/>

                <!-- Decorative aura / energy lines (right side) -->
                <path d="M298 200 Q322 178 310 146" stroke="#FFB5C2" stroke-width="5" fill="none" stroke-linecap="round"/>
                <path d="M308 224 Q336 205 328 172" stroke="#FFB5C2" stroke-width="4" fill="none" stroke-linecap="round"/>
                <path d="M292 245 Q316 238 310 214" stroke="#FFB5C2" stroke-width="3" fill="none" stroke-linecap="round"/>

                <!-- Bottom deco curves + dots -->
                <path d="M108 390 Q120 402 133 390" stroke="#FFB5C2" stroke-width="3.5" fill="none" stroke-linecap="round"/>
                <path d="M227 387 Q239 399 253 387" stroke="#FFB5C2" stroke-width="3.5" fill="none" stroke-linecap="round"/>
                <circle cx="180" cy="408" r="5" fill="#FFB5C2"/>
                <circle cx="163" cy="418" r="3.5" fill="#FFB5C2"/>
                <circle cx="197" cy="418" r="3.5" fill="#FFB5C2"/>

                <!-- Left ear -->
                <circle cx="110" cy="110" r="31" fill="white" stroke="#2a2a2a" stroke-width="3"/>
                <circle cx="110" cy="110" r="19" fill="#FFD0DA"/>

                <!-- Right ear -->
                <circle cx="250" cy="110" r="31" fill="white" stroke="#2a2a2a" stroke-width="3"/>
                <circle cx="250" cy="110" r="19" fill="#FFD0DA"/>

                <!-- Body oval -->
                <ellipse cx="180" cy="305" rx="78" ry="88" fill="white" stroke="#2a2a2a" stroke-width="3"/>

                <!-- Head circle -->
                <circle cx="180" cy="172" r="84" fill="white" stroke="#2a2a2a" stroke-width="3"/>

                <!-- Hair tuft (small ponytail at top) -->
                <path d="M175 88 Q179 64 183 44" stroke="#2a2a2a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                <ellipse cx="183" cy="39" rx="6" ry="10" fill="#2a2a2a"/>
                <circle cx="178" cy="52" r="4" fill="#2a2a2a"/>

                <!-- Eyes - happy closed arcs -->
                <path d="M143 163 Q153 154 163 163" stroke="#2a2a2a" stroke-width="3" fill="none" stroke-linecap="round"/>
                <path d="M197 163 Q207 154 217 163" stroke="#2a2a2a" stroke-width="3" fill="none" stroke-linecap="round"/>

                <!-- Nose with nostrils (the signature feature!) -->
                <ellipse cx="180" cy="185" rx="20" ry="14" fill="#FFCCD5" stroke="#2a2a2a" stroke-width="2"/>
                <circle cx="172" cy="187" r="5" fill="#2a2a2a"/>
                <circle cx="188" cy="187" r="5" fill="#2a2a2a"/>

                <!-- Left cheek freckles -->
                <circle cx="120" cy="180" r="4" fill="#FFB5C2"/>
                <circle cx="112" cy="189" r="4" fill="#FFB5C2"/>
                <circle cx="127" cy="194" r="4" fill="#FFB5C2"/>

                <!-- Right cheek freckles -->
                <circle cx="240" cy="180" r="4" fill="#FFB5C2"/>
                <circle cx="248" cy="189" r="4" fill="#FFB5C2"/>
                <circle cx="233" cy="194" r="4" fill="#FFB5C2"/>

                <!-- Mouth - wide happy smile -->
                <path d="M148 207 Q180 234 212 207" stroke="#2a2a2a" stroke-width="3.5" fill="none" stroke-linecap="round"/>

                <!-- Shirt on body -->
                <path d="M128 256 L115 340 L245 340 L232 256" fill="#f5f5f5" stroke="#2a2a2a" stroke-width="2.5"/>
                <!-- X on shirt -->
                <line x1="158" y1="276" x2="202" y2="314" stroke="#d0d0d0" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="202" y1="276" x2="158" y2="314" stroke="#d0d0d0" stroke-width="2.5" stroke-linecap="round"/>

                <!-- Left arm (relaxed, slightly out) -->
                <path d="M116 272 Q90 293 85 320" stroke="#2a2a2a" stroke-width="3" fill="none" stroke-linecap="round"/>
                <circle cx="82" cy="330" r="15" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

                <!-- Right arm (raised with heart) -->
                <path d="M244 266 Q272 242 280 216" stroke="#2a2a2a" stroke-width="3" fill="none" stroke-linecap="round"/>
                <circle cx="284" cy="206" r="15" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
                <!-- Heart on paw -->
                <path d="M276 199 Q280 193 286 199 Q292 193 297 199 Q297 208 286 218 Q275 208 276 199Z" fill="#FF6B8A"/>

                <!-- Legs -->
                <ellipse cx="152" cy="378" rx="22" ry="28" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
                <ellipse cx="208" cy="378" rx="22" ry="28" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

                <!-- Feet -->
                <ellipse cx="150" cy="402" rx="28" ry="14" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
                <ellipse cx="210" cy="402" rx="28" ry="14" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

            </svg>
        </div>

        <div class="subtitle">1. 停下来，也是一种前进</div>

        <div class="footer">🐾 鼻孔熊の日常</div>
    </div>
</body>
</html>
