<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>插画配文 | 小画家的世界</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f0eb;
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
        }
        header {
            background: #FFE4E8;
            padding: 48px 32px 36px;
            text-align: center;
            border-bottom: 2px solid #FFB5C2;
        }
        header h1 {
            font-size: 36px;
            font-weight: 900;
            color: #1a1a1a;
            letter-spacing: 3px;
        }
        header p {
            margin-top: 10px;
            color: #888;
            font-size: 16px;
        }
        .gallery {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 24px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 28px;
        }
        .card-link {
            text-decoration: none;
            color: inherit;
        }
        .card-thumb {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .card-thumb:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.14);
        }
        .thumb-preview {
            width: 100%;
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
        }
        .thumb-info {
            padding: 18px 20px;
            border-top: 1px solid #f0f0f0;
        }
        .thumb-info h2 {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
        }
        .thumb-info p {
            margin-top: 6px;
            font-size: 14px;
            color: #888;
        }
        .tag {
            display: inline-block;
            margin-top: 10px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        footer {
            text-align: center;
            padding: 40px;
            color: #bbb;
            font-size: 14px;
        }
        footer a { color: #aaa; text-decoration: none; }
    </style>
</head>
<body>
    <header>
        <h1>🎨 小画家的世界</h1>
        <p>原创卡通形象 · 配文插画系列</p>
    </header>

    <div class="gallery">
        <a class="card-link" href="nostril-bear.html">
            <div class="card-thumb">
                <div class="thumb-preview" style="background: #FFF0F2;">🐻</div>
                <div class="thumb-info">
                    <h2>鼻孔熊</h2>
                    <p>比自律更难的，是允许自己「发呆」</p>
                    <span class="tag" style="background:#FFE4E8; color:#E87070;">温暖治愈</span>
                    <span class="tag" style="background:#FFF0F2; color:#cc5588; margin-left:4px;">原创角色</span>
                </div>
            </div>
        </a>

        <a class="card-link" href="salted-fish.html">
            <div class="card-thumb">
                <div class="thumb-preview" style="background: #FFFBF0;">👑</div>
                <div class="thumb-info">
                    <h2>咸鱼大王</h2>
                    <p>比成功更难的，是「心安理得地摆烂」</p>
                    <span class="tag" style="background:#FFF8E0; color:#c8960a;">幽默诙谐</span>
                    <span class="tag" style="background:#FFF0F2; color:#cc5588; margin-left:4px;">原创角色</span>
                </div>
            </div>
        </a>
    </div>

    <footer>
        <p>所有卡通形象均为原创手绘 · 版权所有</p>
        <p style="margin-top:8px;"><a href="/">← 返回博客首页</a></p>
    </footer>
</body>
</html>
