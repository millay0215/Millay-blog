<html lang="zh-CN">
<head>

    <meta property="og:type" content="article">

        "@context": "https://schema.org",

    <style>
        :root {
            --primary: #2563eb;
            --text: #1f2937;
            --bg: #ffffff;
            --gray: #6b7280;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.8;
            color: var(--text);
            background: var(--bg);
        }
        
        header {
            background: var(--bg);
            border-bottom: 1px solid #e5e7eb;
            padding: 1rem 0;
            position: sticky;
            top: 0;
        }
        
        nav {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }
        
        .nav-links a {
            color: var(--text);
            text-decoration: none;
        }
        
        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        
        .post {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .post-header {
            margin-bottom: 2rem;
        }
        
        .post-title {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        .post-content {
            font-size: 1.125rem;
        }
        
        .post-content p {
            margin-bottom: 1.5rem;
        }
        
        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid #e5e7eb;
            color: var(--gray);
            font-size: 0.875rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">Millay Blog</a>
            <ul class="nav-links">
                <li><a href="/">首页</a></li>
                <li><a href="/posts/hello.html">文章</a></li>
                <li><a href="/about.html">关于</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <article class="post">
            <header class="post-header">
                <h1 class="post-title">关于</h1>
            </header>
            
            <div class="post-content">
                <p>你好，我是 Millay。</p>
                
                <p>这是我的个人博客，用于记录学习、思考和分享。</p>
                
                <h2>技术栈</h2>
                
                <p>这个博客使用 Hugo 构建，部署在 Cloudflare Pages 上，实现了全自动发布流程。</p>
                
                <h2>联系方式</h2>
                
                <p>邮箱：millay0215@gmail.com</p>
            </div>
        </article>
    </main>
    
    <footer>
        <p>&copy; 2026 Millay. Built with Hugo & Cloudflare Pages.</p>
    </footer>
</body>
