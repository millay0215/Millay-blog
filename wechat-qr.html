<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信ClawBot登录</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #07c160;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        .qr-container {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .qr-code {
            font-family: monospace;
            font-size: 8px;
            line-height: 8px;
            white-space: pre;
            background: white;
            padding: 10px;
            display: inline-block;
        }
        .tip {
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 微信ClawBot登录</h1>
        <p>请使用微信扫描下方二维码完成连接</p>
        <div class="qr-container">
            <div class="qr-code" id="qr-code">加载中...</div>
        </div>
        <p class="tip">二维码每5分钟自动刷新</p>
    </div>
    <script>
        // 从服务器获取最新二维码
        async function loadQR() {
            try {
                const response = await fetch('/wechat-qr-data.json');
                const data = await response.json();
                document.getElementById('qr-code').textContent = data.qr;
            } catch (e) {
                document.getElementById('qr-code').textContent = '二维码加载失败，请刷新页面';
            }
        }
        loadQR();
        setInterval(loadQR, 30000); // 每30秒刷新
    </script>
</body>
</html>
